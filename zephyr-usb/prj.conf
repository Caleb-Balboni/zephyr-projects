# ─── USB Device Stack (legacy, needed for vendor class) ───
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x00FF
CONFIG_USB_DEVICE_PRODUCT="MCXN947 Vendor Bulk Device"
CONFIG_USB_DEVICE_MANUFACTURER="MyCompany"

# ─── Disable other USB classes that may auto-register ───
CONFIG_USB_CDC_ACM=n
CONFIG_USB_DEVICE_HID=n
CONFIG_USB_DEVICE_BLUETOOTH=n

# ─── Do NOT use the new stack ───
CONFIG_USB_DEVICE_STACK_NEXT=n

# ─── Endpoint buffer size: 512 for HS Bulk ───
CONFIG_USB_REQUEST_BUFFER_SIZE=512

# ─── Console on physical UART (LOG output via J17 debug probe) ───
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# ─── Logging ───
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ─── Performance ───
CONFIG_SPEED_OPTIMIZATIONS=y
