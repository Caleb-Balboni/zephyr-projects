CONFIG_HN_LTE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_MODEM_MODULES=y
CONFIG_MODEM_BACKEND_UART=y
CONFIG_MODEM_PIPE=y
CONFIG_MODEM_CHAT=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Stack sizes
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DEFAULT_IF_PPP=y
#CONFIG_NET_LOG=y

# PPP
CONFIG_NET_L2_PPP=y
CONFIG_NET_PPP=y
CONFIG_MODEM_PPP=y
